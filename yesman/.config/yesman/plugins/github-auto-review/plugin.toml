name = "github-auto-review"
version = "0.1.0"
entry = "main.ts"

[permissions]
run = ["gh", "git", "nu"]
env = ["HOME", "PATH", "GH_TOKEN", "GITHUB_TOKEN"]
read = [
  "/home/christian/.pi/agent/prompts/ts-review.md",
  "/home/christian/dotfiles/pi/.pi/agent/prompts/ts-review.md",
]

[config]
enabled = true
harness_name = "github-auto-review.pi"
thinking = "high"
max_prs_per_tick = 1
list_limit = 50
max_pr_age_hours = 24
agent_timeout_minutes = 10
review_prompt = """
This automated workflow should submit COMMENT unless it finds blocking correctness, security, data-loss, authorization, or severe compatibility issues.
"""

[[config.repositories]]
name = "trusted-server"
cwd = "/home/christian/projects/trusted-server"
repo = "IABTechLab/trusted-server"
enabled = true
skipDrafts = true
